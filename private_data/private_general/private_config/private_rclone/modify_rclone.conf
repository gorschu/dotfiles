#!/usr/bin/env python3
"""Merge rclone-base.conf + rclone-secrets.conf (both chezmoi-managed) with current rclone.conf,
preserving dynamic values that rclone manages itself."""

import configparser
import os
import sys

_data_home = os.path.expanduser("~/data/general/config/rclone")
BASE_CONF = os.path.join(_data_home, "rclone-base.conf")
SECRETS_CONF = os.path.join(_data_home, "rclone-secrets.conf")
PRESERVE = "__PRESERVE__"


class CaseConfigParser(configparser.RawConfigParser):
    def optionxform(self, optionstr: str) -> str:
        return optionstr


def read_conf(source):
    conf = CaseConfigParser()
    if hasattr(source, "read"):
        conf.read_file(source)
    else:
        conf.read(source)
    return conf


def merge(base, secrets, current):
    out = CaseConfigParser()

    # Base declares the managed schema. Secrets can only override declared keys.
    for section in secrets.sections():
        if not base.has_section(section):
            continue
        for key, val in secrets.items(section):
            if base.has_option(section, key):
                base.set(section, key, val)

    for section in base.sections():
        out.add_section(section)
        for key, val in base.items(section):
            if val == PRESERVE:
                if current.has_section(section) and current.has_option(section, key):
                    out.set(section, key, current.get(section, key))
                else:
                    out.set(section, key, "")
            else:
                out.set(section, key, val)

    return out


def main():
    for path in (BASE_CONF, SECRETS_CONF):
        if not os.path.exists(path):
            sys.stderr.write(f"missing: {path}\n")
            sys.exit(1)

    base = read_conf(BASE_CONF)
    secrets = read_conf(SECRETS_CONF)
    current = read_conf(sys.stdin)
    out = merge(base, secrets, current)
    out.write(sys.stdout)


if __name__ == "__main__":
    main()
