#!/usr/bin/env python3
"""Merge rclone-base.conf + rclone-secrets.conf (both chezmoi-managed) with current rclone.conf,
preserving dynamic values (tokens, etc.) that rclone manages itself."""

import configparser
import os
import sys

BASE_CONF = os.path.expanduser("~/.config/rclone/rclone-base.conf")
SECRETS_CONF = os.path.expanduser("~/.config/rclone/rclone-secrets.conf")


def read_conf(source):
    conf = configparser.RawConfigParser()
    conf.optionxform = str  # preserve key case
    if hasattr(source, "read"):
        conf.read_file(source)
    else:
        conf.read(source)
    return conf


def merge(base, secrets, current):
    out = configparser.RawConfigParser()
    out.optionxform = str

    # Apply secrets on top of base (fills in placeholders)
    for section in secrets.sections():
        for key, val in secrets.items(section):
            if val and base.has_section(section):
                base.set(section, key, val)

    for section in base.sections():
        out.add_section(section)
        for key, val in base.items(section):
            # Empty in base+secrets = defer to current (tokens, etc.)
            if not val and current.has_section(section) and current.has_option(section, key):
                out.set(section, key, current.get(section, key))
            else:
                out.set(section, key, val)
        # Preserve keys rclone added that aren't in base at all
        if current.has_section(section):
            for key, val in current.items(section):
                if not base.has_option(section, key):
                    out.set(section, key, val)

    # Preserve entire sections rclone added that aren't in base
    for section in current.sections():
        if not base.has_section(section):
            out.add_section(section)
            for key, val in current.items(section):
                out.set(section, key, val)

    return out


def main():
    for path in (BASE_CONF, SECRETS_CONF):
        if not os.path.exists(path):
            sys.stderr.write(f"missing: {path}\n")
            sys.exit(1)

    base = read_conf(BASE_CONF)
    secrets = read_conf(SECRETS_CONF)
    current = read_conf(sys.stdin)
    out = merge(base, secrets, current)
    out.write(sys.stdout)


if __name__ == "__main__":
    main()
