# Prefer 44.1 kHz for FFXI/Wine DirectSound without pinning the whole system.
#
# Wine's PulseAudio backend can ask the server to fixate the stream rate from
# the sink. For PlayOnline/FFXI, force that fixation to 44.1 kHz so the game
# does not reopen at 48 kHz when PipeWire's graph clock changes.
pulse.rules = [
    {
        matches = [
            { application.name = "PlayOnline Viewer" }
        ]
        actions = {
            update-props = {
                pulse.fix.rate = 44100
            }
        }
    }
]

# Also pin FFXI's actual PipeWire stream node. The Pulse FIX_RATE property only
# applies when the client asks for FIX_RATE; FFXI can later create another audio
# stream that does not take that path, which is where the mid-session 48 kHz
# switch shows up.
stream.rules = [
    {
        matches = [
            { application.name = "PlayOnline Viewer" }
        ]
        actions = {
            update-props = {
                node.rate = 1/44100
                # Prevent long-running FFXI audio from being moved when
                # another client causes an automatic graph-rate change.
                node.lock-rate = true
            }
        }
    }
]
