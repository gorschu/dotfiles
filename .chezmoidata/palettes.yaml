---
# Shared color palettes for template consumers.
#
# Design notes:
# - Keep this close to the upstream Tokyo Night palette model from
#   folke/tokyonight.nvim extras/lua/tokyonight_*.lua.
# - Group tokens semantically by usage so templates can ask for meaning
#   (`ui.bg`, `git.add`, `terminal.red`) instead of carrying their own
#   hex tables.
# - Avoid inventing extra abstraction layers until a concrete consumer needs
#   them. `ui.selection` is the only deliberate alias here; it maps to the
#   upstream visual-selection background.

palettes:
  catppuccin:
    source:
      repo: catppuccin/palette
